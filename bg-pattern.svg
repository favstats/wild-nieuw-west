  <ellipse cx="82" cy="228" rx="5" ry="8" fill="rgba(148,100,130,0.15)" transform="rotate(5 82 228)"/>
  <ellipse cx="76" cy="238" rx="4" ry="6" fill="rgba(148,100,130,0.12)"/>
