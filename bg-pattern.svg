  <!-- ========== PEACOCK FEATHER EYES (scattered) ========== -->
  <circle cx="50" cy="60" r="8" fill="none" stroke="rgba(138,154,91,0.18)" stroke-width="1.5"/>
  <circle cx="50" cy="60" r="4" fill="rgba(107,122,69,0.15)"/>
