  <path d="M0 100 C40 80, 80 30, 120 50 S180 130, 220 100 S300 30, 340 60 S390 120, 400 100"
        stroke="rgba(138,154,91,0.20)" stroke-width="1.5" fill="none"/>
  <path d="M0 300 C40 320, 80 370, 120 350 S180 270, 220 300 S300 370, 340 340 S390 280, 400 300"
        stroke="rgba(138,154,91,0.20)" stroke-width="1.5" fill="none"/>

